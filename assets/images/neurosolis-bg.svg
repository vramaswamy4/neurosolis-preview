<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FAFC"/>
    </linearGradient>

    <!-- Soft washes (subtle, but visible) -->
    <radialGradient id="washBlue" cx="82%" cy="48%" r="62%">
      <stop offset="0%" stop-color="#0F699A" stop-opacity="0.10"/>
      <stop offset="35%" stop-color="#0F699A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0F699A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="washTeal" cx="90%" cy="34%" r="50%">
      <stop offset="0%" stop-color="#17A2A4" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#17A2A4" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#17A2A4" stop-opacity="0"/>
    </radialGradient>

    <!-- Very soft blur -->
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>

    <!-- Dust pattern (visible but subtle) -->
    <pattern id="dust" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="24" r="1.6" fill="#0F699A" opacity="0.09"/>
      <circle cx="70" cy="18" r="1.3" fill="#0F699A" opacity="0.07"/>
      <circle cx="98" cy="66" r="1.4" fill="#0F699A" opacity="0.08"/>
      <circle cx="40" cy="86" r="1.2" fill="#0F699A" opacity="0.06"/>
      <circle cx="22" cy="104" r="1.3" fill="#0F699A" opacity="0.07"/>
      <circle cx="86" cy="96" r="1.2" fill="#0F699A" opacity="0.06"/>
      <circle cx="58" cy="54" r="1.1" fill="#17A2A4" opacity="0.08"/>
    </pattern>

    <style>
      /* Increase opacities so it shows in Figma */
      .arc1 { fill:none; stroke:#0F699A; stroke-opacity:0.22; stroke-width:1.4; }
      .arc2 { fill:none; stroke:#0A3F5C; stroke-opacity:0.12; stroke-width:1.3; }
      .arc3 { fill:none; stroke:#17A2A4; stroke-opacity:0.18; stroke-width:1.3; }

      .link1 { stroke:#0F699A; stroke-opacity:0.16; stroke-width:1.3; }
      .link2 { stroke:#17A2A4; stroke-opacity:0.17; stroke-width:1.3; }

      .node1 { fill:#0F699A; fill-opacity:0.26; }
      .node2 { fill:#17A2A4; fill-opacity:0.28; }

      .hair { fill:none; stroke:#0F699A; stroke-opacity:0.08; stroke-width:1.1; }
    </style>
  </defs>

  <!-- Base -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Washes -->
  <rect width="1600" height="900" fill="url(#washBlue)"/>
  <rect width="1600" height="900" fill="url(#washTeal)"/>

  <!-- Dust (right half) -->
  <rect x="700" y="0" width="900" height="900" fill="url(#dust)" opacity="0.65"/>

  <!-- Gentle sweeping curves -->
  <g>
    <path d="M-80 210 C 280 110, 640 150, 980 70" class="hair"/>
    <path d="M-120 360 C 260 250, 640 290, 1040 210" class="hair"/>
    <path d="M-140 520 C 260 410, 720 470, 1180 390" class="hair"/>
    <path d="M-160 680 C 280 560, 780 640, 1260 560" class="hair"/>
  </g>

  <!-- Network cluster (off-canvas right so it cuts off naturally) -->
  <g filter="url(#softBlur)" transform="translate(1505 450)">
    <!-- Layered arcs -->
    <ellipse rx="520" ry="410" class="arc2" transform="rotate(12) translate(-10 6)"/>
    <ellipse rx="480" ry="380" class="arc1" transform="rotate(-8) translate(16 -6)"/>
    <ellipse rx="440" ry="350" class="arc2" transform="rotate(18) translate(-18 12)"/>
    <ellipse rx="400" ry="320" class="arc1" transform="rotate(-16) translate(12 10)"/>
    <ellipse rx="360" ry="290" class="arc2" transform="rotate(28) translate(-14 -10)"/>
    <ellipse rx="320" ry="255" class="arc1" transform="rotate(-24) translate(10 -2)"/>
    <ellipse rx="280" ry="220" class="arc2" transform="rotate(36) translate(-8 8)"/>
    <ellipse rx="240" ry="190" class="arc1" transform="rotate(-34) translate(6 -6)"/>

    <!-- Cross-planes -->
    <ellipse rx="520" ry="185" class="arc1" transform="rotate(22)"/>
    <ellipse rx="470" ry="165" class="arc2" transform="rotate(-18)"/>
    <ellipse rx="410" ry="145" class="arc1" transform="rotate(62)"/>
    <ellipse rx="370" ry="132" class="arc3" transform="rotate(-56)"/>

    <!-- Links -->
    <line x1="-360" y1="-130" x2="-150" y2="-320" class="link1"/>
    <line x1="-150" y1="-320" x2="140"  y2="-270" class="link2"/>
    <line x1="140"  y1="-270" x2="360"  y2="-60"  class="link1"/>
    <line x1="360"  y1="-60"  x2="290"  y2="220"  class="link2"/>
    <line x1="290"  y1="220"  x2="20"   y2="310"  class="link1"/>
    <line x1="20"   y1="310"  x2="-280" y2="170"  class="link2"/>
    <line x1="-280" y1="170"  x2="-360" y2="-130" class="link1"/>

    <line x1="-240" y1="-10" x2="-70"  y2="-95" class="link2"/>
    <line x1="-70"  y1="-95" x2="120"  y2="35"  class="link1"/>
    <line x1="120"  y1="35"  x2="-10"  y2="160" class="link2"/>

    <line x1="-260" y1="-240" x2="-95" y2="-65"  class="link1"/>
    <line x1="-95"  y1="-65"  x2="40"  y2="-255" class="link2"/>
    <line x1="40"   y1="-255" x2="210" y2="-140" class="link1"/>
    <line x1="210"  y1="-140" x2="85"  y2="0"    class="link2"/>

    <!-- Nodes -->
    <circle cx="-360" cy="-130" r="8"  class="node1"/>
    <circle cx="-150" cy="-320" r="10" class="node2"/>
    <circle cx="140"  cy="-270" r="7"  class="node1"/>
    <circle cx="360"  cy="-60"  r="11" class="node2"/>
    <circle cx="290"  cy="220"  r="8"  class="node1"/>
    <circle cx="20"   cy="310"  r="10" class="node2"/>
    <circle cx="-280" cy="170"  r="7"  class="node1"/>

    <circle cx="-240" cy="-10"  r="7"  class="node1"/>
    <circle cx="-70"  cy="-95"  r="9"  class="node2"/>
    <circle cx="120"  cy="35"   r="7"  class="node1"/>
    <circle cx="-10"  cy="160"  r="9"  class="node2"/>

    <circle cx="-260" cy="-240" r="6"  class="node1"/>
    <circle cx="-95"  cy="-65"  r="8"  class="node2"/>
    <circle cx="40"   cy="-255" r="6"  class="node1"/>
    <circle cx="210"  cy="-140" r="8"  class="node2"/>
    <circle cx="85"   cy="0"    r="6"  class="node1"/>
  </g>
</svg>
